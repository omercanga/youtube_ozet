services:
  backend:
    build: ./backend
    container_name: youtube_analyzer_backend
    environment:
      DATABASE_URL: "sqlite:////app/data/app.db"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_MODEL: ${AI_MODEL:-openai/gpt-3.5-turbo}
      CORS_ORIGINS: "http://localhost:5180,http://localhost:3000"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: youtube_analyzer_frontend
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001
    command: npm run dev -- --host

volumes:
  backend_data:
